name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [model_drift_alert]

jobs:
  # STAGE 1: Continuous Integration
  CI-Stage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.9'

      - name: Linting & Unit Testing
        run: |
          pip install flake8 pytest pandas
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Agar tests folder banaya hai tabhi ye chalega, warna is line ko delete kar dein
          # pytest tests/test_data.py

  # STAGE 2: Build & Packaging
  Build-Stage:
    needs: CI-Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code # YEH STEP MISSING THA
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2 # Updated version
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Training Image
        run: |
          gcloud auth configure-docker --quiet
          # Artifact Registry ya GCR check karein. 
          # Agar Artifact Registry use kar rahe hain toh host different hoga.
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/fraud-trainer:latest .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/fraud-trainer:latest

  # STAGE 3: Continuous Deployment
  CD-Stage:
    needs: Build-Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Kubeflow Pipeline
        run: |
          pip install google-cloud-aiplatform kfp
          python pipeline.py
